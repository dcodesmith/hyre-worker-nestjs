name: SonarCloud Analysis
on:
  push:
    branches: [ main, "feature/*", chore/*, bug/*, refactor/* ]
  pull_request:
    branches: [ main, "feature/*", chore/*, bug/*, refactor/* ]
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarCloud
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
    runs-on: ubuntu-latest
    env:
      CI_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    steps:
      - name: Check SONAR_TOKEN
        run: '[ -n "$SONAR_TOKEN" ] || { echo "SONAR_TOKEN is empty or not set"; exit 1; }'
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pnpm exec prisma generate
      - name: Run tests with coverage
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pnpm run test:coverage:ci
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}