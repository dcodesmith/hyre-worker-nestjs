name: Type Check

on:
  push:
    branches: [ main, "feature/*", chore/*, bug/*, refactor/* ]
  pull_request:
    branches: [ main, "feature/*", chore/*, bug/*, refactor/* ]

jobs:
  typecheck:
    name: Run TypeScript type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI_DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type-check (pretype-check runs prisma generate)
        env:
          DATABASE_URL: ${{ env.CI_DATABASE_URL }}
        run: pnpm run type-check
