name: Validate Fly.io Deployment

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/fly-deploy.yml"
      - ".github/workflows/fly-validate.yml"
      - "fly.toml"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate deployment config and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: prisma_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prisma_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    # if: false  # Temporarily disabled - remove this line to re-enable
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint deploy workflows
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest
          ./actionlint -color -oneline .github/workflows/fly-deploy.yml .github/workflows/fly-validate.yml

      # Pin to v4 - check for updates with: gh api repos/pnpm/action-setup/tags --jq '.[0].name'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # Pin to v4 - check for updates with: gh api repos/actions/setup-node/tags --jq '.[0].name'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      # Pin to v3.12.0 - check for updates with: gh api repos/docker/setup-buildx-action/tags --jq '.[0].name'
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
      
      - name: Install Flyctl
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> "$GITHUB_PATH"
      
      - name: Validate Fly.io config
        run: flyctl config validate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Validate Prisma migrations on clean Postgres
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/prisma_ci?schema=public
      
      - name: Build Docker image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hyre-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

