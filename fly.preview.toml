# Preview Fly config for PR environments.
# App name is injected by the review-app GitHub action.

primary_region = "lhr"

[env]
  TZ = "Africa/Lagos"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
